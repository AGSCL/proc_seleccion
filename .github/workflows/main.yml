name: Render and Deploy RMarkdown Website

on:
  push:
  schedule:
    - cron: '0 0 * * MON' # http://www.cronmaker.com/?0 https://crontab.guru/every-monday #https://github.com/actions/cache  https://github.com/actions/cache/blob/main/examples.md#r---renv

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        r-version: [4.1.2]
    permissions:
      contents: write
      issues: write
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          # Necessary to ensure that the .Renviron and renv.lock file are available
      - name: Set up R ${{ matrix.r-version }}
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
      - uses: r-lib/actions/setup-pandoc@v1

      - name: Cache Renv packages
        uses: actions/cache@v2
        with:
          path: |
            ${{ env.R_LIBS_USER }}
            renv/library/R-*
            renv/cache/
          key: ${{ runner.os }}-r-${{ hashFiles('**/renv.lock') }}
          restore-keys: ${{ runner.os }}-r-

      - name: Set locale Spanish
        shell: pwsh
        run: |
          Set-WinSystemLocale es-ES

      - name: Restore R environment with renv
        run: |
          if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
          renv::restore()
        shell: Rscript {0}

      - name: Render RMarkdown
        run: rmarkdown::render("proy_proc_sel.Rmd")
        shell: Rscript {0}

      - name: Commit files
        run: |
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"
          git add .
          git commit --allow-empty -am "AUTO-GH ACTION: ${{ github.workflow }} $(date)"

      - name: Push changes to gh-pages
        uses: ad-m/github-push-action@master
        with:
          force: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
