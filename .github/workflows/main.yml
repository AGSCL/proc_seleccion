name: Render and Deploy RMarkdown Website
on:
  push:
  schedule:
    - cron: '0 0 * * * ' #http://www.cronmaker.com/?0
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        r-version: [4.1.2]
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v2
      - name: Set up R ${{ matrix.r-version }}		
        uses: r-lib/actions/setup-r@master
        with:
          r-version: ${{ matrix.r-version }}
        uses: actions/cache@v1
        with:
	  path: ${{ env.R_LIBS_USER }}
          key: r-${{ hashFiles('DESCRIPTION') }}
      - uses: r-lib/actions/setup-pandoc@v1
      - name: Install lintr
        run: install.packages("lintr")
        shell: Rscript {0}
      - name: LINT
        run: lintr::lint_dir()
        shell: Rscript {0}
      - name: Install devtools
        run: install.packages("devtools")
        shell: Rscript {0}
      - name: Install rmarkdown
        run: install.packages("rmarkdown")
        shell: Rscript {0}
      - name: Install knitr
        run: install.packages("knitr")
        shell: Rscript {0}
      - name: Install distill
        run: install.packages("distill")
        shell: Rscript {0}
      - name: Install withr
        run: install.packages("withr")
        shell: Rscript {0}
      - name: Render Site
        run: rmarkdown::render("proy_proc_sel.Rmd")
        shell: Rscript {0}