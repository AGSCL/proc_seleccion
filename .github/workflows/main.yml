name: Render and Deploy RMarkdown Website
on:
  push:
  schedule:
    - cron: '0 0 * * MON' #http://www.cronmaker.com/?0 https://crontab.guru/every-monday #https://github.com/actions/cache  https://github.com/actions/cache/blob/main/examples.md#r---renv
jobs: 
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        r-version: [4.1.2]
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v2
      - name: Set up R ${{ matrix.r-version }}		
        uses: r-lib/actions/setup-r@master
        with:
          r-version: ${{ matrix.r-version }}
      - uses: r-lib/actions/setup-pandoc@v1
      - name: Install lintr
        run: install.packages("lintr")
        shell: Rscript {0}
      - name: LINT
        run: lintr::lint_dir()
        shell: Rscript {0}
      - name: Install devtools
        run: install.packages("devtools")
        shell: Rscript {0}
      - name: Install rmarkdown
        run: install.packages("rmarkdown")
        shell: Rscript {0}
      - name: Install knitr
        run: install.packages("knitr")
        shell: Rscript {0}
      - name: Install distill
        run: install.packages("distill")
        shell: Rscript {0}
      - name: Install withr
        run: install.packages("withr")
        shell: Rscript {0}
      - name: Render Site
        run: rmarkdown::render("proy_proc_sel.Rmd")
        shell: Rscript {0}
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT }}
      - name: Commit files
        run: |
          git config --local core.autocrlf false
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"
          git add . && git add --renormalize .
          git commit --allow-empty -am "AUTO-GH ACTION: ${{ github.workflow }}"
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          branch: ${{ github.head_ref }}
          github_token: ${{ secrets.GITHUB_TOKEN }}